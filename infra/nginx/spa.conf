# Generic SPA nginx config (landing + 5 web apps).
# Copied into each image's /etc/nginx/conf.d/app.conf.
server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Disable server tokens.
    server_tokens off;

    # Gzip text assets.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Cache hashed static assets aggressively (Vite produces hashed filenames).
    location /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: anything else routes to index.html.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }

    # Lightweight healthcheck endpoint for Docker/Traefik.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
