# Generic SPA nginx config (landing + 5 web apps).
# Copied into each image's /etc/nginx/conf.d/app.conf.
server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Disable server tokens.
    server_tokens off;

    # Gzip text assets.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Cache hashed static assets aggressively (Vite produces hashed filenames).
    location /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SEO / PWA 정적 자산 — SPA fallback 함정 차단 (#213).
    # exact-match `location =` 가 일반 `location /` 의 try_files 폴백을 선점한다.
    # 파일 없으면 404 (HTML fallback 금지). content-type은 nginx mime.types가 처리하지만,
    # robots/sitemap/manifest는 명시적으로 박아 크롤러 호환을 보장한다.
    #
    # 캐싱 규칙:
    # - `expires` 지시어가 `Cache-Control: max-age=N` + `Expires` 헤더 자동 생성.
    #   `add_header Cache-Control "public"` 으로 publicness 만 보강한다 (중복 max-age 방지).
    #   참조: /assets/ 블록 (line 28-33) 과 동일 패턴.
    location = /favicon.ico {
        try_files $uri =404;
        access_log off;
        log_not_found off;
        expires 7d;
        add_header Cache-Control "public";
    }
    location = /favicon.svg {
        try_files $uri =404;
        access_log off;
        log_not_found off;
        expires 7d;
        add_header Cache-Control "public";
    }
    location = /robots.txt {
        try_files $uri =404;
        access_log off;
        log_not_found off;
        default_type text/plain;
        expires 1h;
        add_header Cache-Control "public";
    }
    location = /sitemap.xml {
        try_files $uri =404;
        access_log off;
        log_not_found off;
        default_type application/xml;
        expires 1h;
        add_header Cache-Control "public";
    }
    location = /site.webmanifest {
        try_files $uri =404;
        access_log off;
        log_not_found off;
        default_type application/manifest+json;
        expires 1h;
        add_header Cache-Control "public";
    }
    location = /icon-192.png {
        try_files $uri =404;
        access_log off;
        log_not_found off;
        expires 7d;
        add_header Cache-Control "public";
    }
    location = /icon-512.png {
        try_files $uri =404;
        access_log off;
        log_not_found off;
        expires 7d;
        add_header Cache-Control "public";
    }

    # SPA fallback: anything else routes to index.html.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }

    # Lightweight healthcheck endpoint for Docker/Traefik.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
