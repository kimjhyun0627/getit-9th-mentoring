# Traefik v3 static config.
# Mounted read-only into /etc/traefik/traefik.yml by docker-compose.prod.yml.
# Dynamic per-service routing comes from docker labels (provider: docker).

global:
  checkNewVersion: false
  sendAnonymousUsage: false

# JSON access log on stdout — picked up by docker logs / Loki later.
log:
  level: INFO
  format: json

accessLog:
  format: json
  fields:
    headers:
      defaultMode: drop
      names:
        User-Agent: keep
        Referer: keep
        X-Forwarded-For: keep

api:
  # Dashboard disabled in prod (do not expose). Enable via override file if needed.
  dashboard: false
  insecure: false

entryPoints:
  web:
    address: ":80"
    http:
      # Force HTTP → HTTPS redirect for every router on this entrypoint.
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"
    http:
      tls:
        certResolver: letsencrypt

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    # Containers must opt-in with `traefik.enable=true`. Safer default.
    exposedByDefault: false
    network: getit-edge
    watch: true
  file:
    directory: /etc/traefik/dynamic
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      # email은 docker-compose.prod.yml의 TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_EMAIL
      # 환경변수로 주입한다. static config file은 ${...} expansion을 안 하기 때문에
      # 여기에 적으면 literal "${ACME_EMAIL}"이 Let's Encrypt로 전달돼 invalidContact 에러 발생.
      storage: /letsencrypt/acme.json
      keyType: EC256
      httpChallenge:
        entryPoint: web
