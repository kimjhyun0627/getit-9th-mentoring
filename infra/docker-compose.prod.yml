# GETIT 9기 — production stack (single GCP VM).
#
# Usage on VM:
#   cd /opt/getit/infra
#   cp .env.prod.example .env.prod    # then fill in real secrets
#   docker compose --env-file .env.prod -f docker-compose.prod.yml pull
#   docker compose --env-file .env.prod -f docker-compose.prod.yml up -d
#
# Images come from GHCR (built by GitHub Actions). To rebuild locally instead,
# replace `image:` lines with the commented `build:` blocks.

name: getit

x-api-env: &api-env
  NODE_ENV: production
  # DATABASE_URL is *not* in the shared anchor — each API must point at its own
  # schema (see init SQL). Per-service override below.
  JWT_SECRET: ${JWT_SECRET}
  JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
  JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
  COOKIE_DOMAIN: ${COOKIE_DOMAIN:-.get-it.cloud}
  COOKIE_SECURE: ${COOKIE_SECURE:-true}
  TRUST_PROXY: "1"
  SENTRY_DSN: ${SENTRY_DSN:-}
  # SMTP (auth-api 비번 재설정/이메일 인증 — PR #349 mailer).
  # Issue #575 — SMTP_HOST 빈 채로 boot 하면 @getit/env-validator 가 throw (production).
  # 의도적으로 메일 채널을 끄려면 MAILER_DISABLED_ALLOWED=true 로 warn 격하.
  SMTP_HOST: ${SMTP_HOST:-}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASS: ${SMTP_PASS:-}
  SMTP_FROM: ${SMTP_FROM:-GETIT/9 <noreply@get-it.cloud>}
  MAILER_DISABLED_ALLOWED: ${MAILER_DISABLED_ALLOWED:-}

x-restart: &restart
  restart: unless-stopped

networks:
  edge:
    name: getit-edge
  internal:
    name: getit-internal
    internal: true

volumes:
  mysql_data:
  traefik_letsencrypt:

services:
  # ────────────────────────── Reverse proxy ──────────────────────────
  traefik:
    # v3.7.1: Docker 29+ 자동 API 버전 협상 지원 (v3.6.1+부터 도입).
    # 이전 v3.5/v3.0은 하드코딩된 API v1.24만 지원 →
    # Docker 29의 최소 요구 버전(1.44)과 맞지 않아 "Minimum supported API version is 1.44" 에러 발생.
    image: traefik:v3.7.1
    <<: *restart
    command:
      - --configFile=/etc/traefik/traefik.yml
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Traefik static config (traefik.yml)은 env var expansion을 하지 않는다.
      # ACME email은 환경변수 override로 주입해야 Let's Encrypt가 실제 값을 받는다.
      # ref: https://doc.traefik.io/traefik/reference/static-configuration/env/
      TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_EMAIL: ${ACME_EMAIL:?ACME_EMAIL 변수가 필요합니다. .env.prod 파일에 설정해주세요.}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik_letsencrypt:/letsencrypt
    networks: [edge]

  # ─────────────────────────── Database ──────────────────────────────
  mysql:
    image: mysql:8.0
    <<: *restart
    command:
      - --default-authentication-plugin=caching_sha2_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_APP_USER}
      MYSQL_PASSWORD: ${MYSQL_APP_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    networks: [internal]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─────────────────────────── Landing ───────────────────────────────
  landing:
    image: ${IMAGE_REGISTRY}/landing:${IMAGE_TAG}
    <<: *restart
    networks: [edge]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=getit-edge"
      - "traefik.http.routers.landing.rule=Host(`get-it.cloud`) || Host(`www.get-it.cloud`)"
      - "traefik.http.routers.landing.entrypoints=websecure"
      - "traefik.http.routers.landing.tls.certresolver=letsencrypt"
      - "traefik.http.routers.landing.middlewares=security-headers@file,compress@file"
      - "traefik.http.services.landing.loadbalancer.server.port=80"

  # ─────────────────────────── auth ──────────────────────────────────
  auth-web:
    image: ${IMAGE_REGISTRY}/auth-web:${IMAGE_TAG}
    <<: *restart
    networks: [edge]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=getit-edge"
      - "traefik.http.routers.auth-web.rule=Host(`auth.get-it.cloud`) && !PathPrefix(`/api`)"
      - "traefik.http.routers.auth-web.entrypoints=websecure"
      - "traefik.http.routers.auth-web.tls.certresolver=letsencrypt"
      - "traefik.http.routers.auth-web.middlewares=security-headers@file,compress@file"
      - "traefik.http.services.auth-web.loadbalancer.server.port=80"

  auth-api:
    image: ${IMAGE_REGISTRY}/auth-api:${IMAGE_TAG}
    <<: *restart
    environment:
      <<: *api-env
      PORT: "3001"
      DATABASE_URL: "mysql://${MYSQL_APP_USER}:${MYSQL_APP_PASSWORD}@mysql:3306/auth"
      CORS_ORIGINS: "https://get-it.cloud,https://www.get-it.cloud,https://auth.get-it.cloud,https://hobby.get-it.cloud,https://shelf.get-it.cloud,https://board.get-it.cloud,https://letter.get-it.cloud"
    depends_on:
      mysql: { condition: service_healthy }
    networks: [edge, internal]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=getit-edge"
      - "traefik.http.routers.auth-api.rule=Host(`auth.get-it.cloud`) && PathPrefix(`/api`)"
      - "traefik.http.routers.auth-api.entrypoints=websecure"
      - "traefik.http.routers.auth-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.auth-api.middlewares=security-headers@file,api-rate-limit@file"
      - "traefik.http.services.auth-api.loadbalancer.server.port=3001"

  # ─────────────────────────── hobby ─────────────────────────────────
  hobby-web:
    image: ${IMAGE_REGISTRY}/hobby-web:${IMAGE_TAG}
    <<: *restart
    networks: [edge]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=getit-edge"
      - "traefik.http.routers.hobby-web.rule=Host(`hobby.get-it.cloud`) && !PathPrefix(`/api`)"
      - "traefik.http.routers.hobby-web.entrypoints=websecure"
      - "traefik.http.routers.hobby-web.tls.certresolver=letsencrypt"
      - "traefik.http.routers.hobby-web.middlewares=security-headers@file,compress@file"
      - "traefik.http.services.hobby-web.loadbalancer.server.port=80"

  hobby-api:
    image: ${IMAGE_REGISTRY}/hobby-api:${IMAGE_TAG}
    <<: *restart
    environment:
      <<: *api-env
      PORT: "3002"
      DATABASE_URL: "mysql://${MYSQL_APP_USER}:${MYSQL_APP_PASSWORD}@mysql:3306/hobby"
      CORS_ORIGINS: "https://hobby.get-it.cloud"
      KAKAO_API_KEY: ${KAKAO_API_KEY:-}
      # #572: 학교 인증 가드 prod 강제. .env.prod 에서 명시적으로 끄지 않는 한 켜짐.
      # 미정의/`'true'` 외 값 → src/server.js 의 assertSchoolAuthEnvDeclared() 가
      # process.exit(1) → 컨테이너 즉시 죽음 (silent disable 방지).
      SCHOOL_AUTH_GUARD_ENABLED: "${SCHOOL_AUTH_GUARD_ENABLED:-true}"
    depends_on:
      mysql: { condition: service_healthy }
    networks: [edge, internal]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=getit-edge"
      - "traefik.http.routers.hobby-api.rule=Host(`hobby.get-it.cloud`) && PathPrefix(`/api`)"
      - "traefik.http.routers.hobby-api.entrypoints=websecure"
      - "traefik.http.routers.hobby-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.hobby-api.middlewares=security-headers@file,api-rate-limit@file"
      - "traefik.http.services.hobby-api.loadbalancer.server.port=3002"

  # ─────────────────────────── shelf ─────────────────────────────────
  shelf-web:
    image: ${IMAGE_REGISTRY}/shelf-web:${IMAGE_TAG}
    <<: *restart
    networks: [edge]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=getit-edge"
      - "traefik.http.routers.shelf-web.rule=Host(`shelf.get-it.cloud`) && !PathPrefix(`/api`)"
      - "traefik.http.routers.shelf-web.entrypoints=websecure"
      - "traefik.http.routers.shelf-web.tls.certresolver=letsencrypt"
      - "traefik.http.routers.shelf-web.middlewares=security-headers@file,compress@file"
      - "traefik.http.services.shelf-web.loadbalancer.server.port=80"

  shelf-api:
    image: ${IMAGE_REGISTRY}/shelf-api:${IMAGE_TAG}
    <<: *restart
    environment:
      <<: *api-env
      PORT: "3003"
      DATABASE_URL: "mysql://${MYSQL_APP_USER}:${MYSQL_APP_PASSWORD}@mysql:3306/shelf"
      CORS_ORIGINS: "https://shelf.get-it.cloud"
      # 카카오 도서 API 키 — 운영 secret. 누락 시 컨테이너 boot 실패 (validateEnv fail-fast).
      KAKAO_BOOK_API_KEY: ${KAKAO_BOOK_API_KEY:-}
    depends_on:
      mysql: { condition: service_healthy }
    networks: [edge, internal]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=getit-edge"
      - "traefik.http.routers.shelf-api.rule=Host(`shelf.get-it.cloud`) && PathPrefix(`/api`)"
      - "traefik.http.routers.shelf-api.entrypoints=websecure"
      - "traefik.http.routers.shelf-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.shelf-api.middlewares=security-headers@file,api-rate-limit@file"
      - "traefik.http.services.shelf-api.loadbalancer.server.port=3003"

  # ─────────────────────────── board ─────────────────────────────────
  board-web:
    image: ${IMAGE_REGISTRY}/board-web:${IMAGE_TAG}
    <<: *restart
    networks: [edge]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=getit-edge"
      - "traefik.http.routers.board-web.rule=Host(`board.get-it.cloud`) && !PathPrefix(`/api`)"
      - "traefik.http.routers.board-web.entrypoints=websecure"
      - "traefik.http.routers.board-web.tls.certresolver=letsencrypt"
      - "traefik.http.routers.board-web.middlewares=security-headers@file,compress@file"
      - "traefik.http.services.board-web.loadbalancer.server.port=80"

  board-api:
    image: ${IMAGE_REGISTRY}/board-api:${IMAGE_TAG}
    <<: *restart
    environment:
      <<: *api-env
      PORT: "3004"
      DATABASE_URL: "mysql://${MYSQL_APP_USER}:${MYSQL_APP_PASSWORD}@mysql:3306/board"
      CORS_ORIGINS: "https://board.get-it.cloud"
    depends_on:
      mysql: { condition: service_healthy }
    networks: [edge, internal]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=getit-edge"
      - "traefik.http.routers.board-api.rule=Host(`board.get-it.cloud`) && PathPrefix(`/api`)"
      - "traefik.http.routers.board-api.entrypoints=websecure"
      - "traefik.http.routers.board-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.board-api.middlewares=security-headers@file,api-rate-limit@file"
      - "traefik.http.services.board-api.loadbalancer.server.port=3004"

  # ─────────────────────────── letter ────────────────────────────────
  letter-web:
    image: ${IMAGE_REGISTRY}/letter-web:${IMAGE_TAG}
    <<: *restart
    networks: [edge]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=getit-edge"
      - "traefik.http.routers.letter-web.rule=Host(`letter.get-it.cloud`) && !PathPrefix(`/api`)"
      - "traefik.http.routers.letter-web.entrypoints=websecure"
      - "traefik.http.routers.letter-web.tls.certresolver=letsencrypt"
      - "traefik.http.routers.letter-web.middlewares=security-headers@file,compress@file"
      - "traefik.http.services.letter-web.loadbalancer.server.port=80"

  letter-api:
    image: ${IMAGE_REGISTRY}/letter-api:${IMAGE_TAG}
    <<: *restart
    environment:
      <<: *api-env
      PORT: "3005"
      DATABASE_URL: "mysql://${MYSQL_APP_USER}:${MYSQL_APP_PASSWORD}@mysql:3306/letter"
      CORS_ORIGINS: "https://letter.get-it.cloud"
    depends_on:
      mysql: { condition: service_healthy }
    networks: [edge, internal]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=getit-edge"
      - "traefik.http.routers.letter-api.rule=Host(`letter.get-it.cloud`) && PathPrefix(`/api`)"
      - "traefik.http.routers.letter-api.entrypoints=websecure"
      - "traefik.http.routers.letter-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.letter-api.middlewares=security-headers@file,api-rate-limit@file"
      - "traefik.http.services.letter-api.loadbalancer.server.port=3005"
