    <style>
      :root {
        color-scheme: light;
      }
      html.dark {
        color-scheme: dark;
      }

      /* ----- background: dotted + soft blobs ----- */
      .bg-dotted {
        background-image: radial-gradient(
          rgba(15, 23, 42, 0.08) 1.2px,
          transparent 1.2px
        );
        background-size: 22px 22px;
      }
      .dark .bg-dotted {
        background-image: radial-gradient(
          rgba(255, 255, 255, 0.08) 1.2px,
          transparent 1.2px
        );
      }

      .blob {
        position: absolute;
        border-radius: 9999px;
        filter: blur(60px);
        opacity: 0.55;
        pointer-events: none;
        z-index: 0;
      }
      .dark .blob {
        opacity: 0.35;
        filter: blur(70px);
      }

      /* ----- card gradients (per card) ----- */
      .card-coral {
        background-image: linear-gradient(135deg, #ffb199 0%, #ff6a88 55%, #ff3d7f 100%);
      }
      .card-lime {
        background-image: linear-gradient(135deg, #c8f284 0%, #6ee7b7 55%, #14b8a6 100%);
      }
      .card-violet {
        background-image: linear-gradient(135deg, #c4b5fd 0%, #8b5cf6 55%, #6366f1 100%);
      }
      .card-sun {
        background-image: linear-gradient(135deg, #fde68a 0%, #fb923c 55%, #f43f5e 100%);
      }

      /* dark variants — slightly desaturated + glow */
      .dark .card-coral {
        background-image: linear-gradient(135deg, #b86b6b 0%, #c0466a 55%, #b03070 100%);
        box-shadow: 0 18px 50px -18px rgba(255, 61, 127, 0.45),
          0 0 0 1px rgba(255, 255, 255, 0.06) inset;
      }
      .dark .card-lime {
        background-image: linear-gradient(135deg, #7fae5a 0%, #4fa78b 55%, #0f7a72 100%);
        box-shadow: 0 18px 50px -18px rgba(110, 231, 183, 0.4),
          0 0 0 1px rgba(255, 255, 255, 0.06) inset;
      }
      .dark .card-violet {
        background-image: linear-gradient(135deg, #8c79c4 0%, #6e44c8 55%, #4a4cc0 100%);
        box-shadow: 0 18px 50px -18px rgba(139, 92, 246, 0.5),
          0 0 0 1px rgba(255, 255, 255, 0.06) inset;
      }
      .dark .card-sun {
        background-image: linear-gradient(135deg, #c5a35e 0%, #c47238 55%, #b03350 100%);
        box-shadow: 0 18px 50px -18px rgba(251, 146, 60, 0.45),
          0 0 0 1px rgba(255, 255, 255, 0.06) inset;
      }

      /* ----- rotation + hover micro-interactions ----- */
      .tilt-l { transform: rotate(-2.2deg); }
      .tilt-r { transform: rotate(2deg); }
      .tilt-l2 { transform: rotate(-1deg); }
      .tilt-r2 { transform: rotate(1.4deg); }

      .card {
        transition:
          transform 280ms cubic-bezier(0.34, 1.56, 0.64, 1),
          box-shadow 280ms ease;
        will-change: transform;
      }
      .card:hover {
        transform: rotate(0deg) translateY(-8px) scale(1.025);
        box-shadow:
          0 32px 60px -22px rgba(0, 0, 0, 0.28),
          0 0 0 1px rgba(255, 255, 255, 0.25) inset;
      }
      .dark .card:hover {
        box-shadow:
          0 32px 60px -22px rgba(0, 0, 0, 0.6),
          0 0 0 1px rgba(255, 255, 255, 0.08) inset,
          0 0 40px -10px rgba(255, 255, 255, 0.12);
      }

      .emoji {
        display: inline-block;
        transition: transform 320ms cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .card:hover .emoji {
        animation: bounce 700ms cubic-bezier(0.34, 1.56, 0.64, 1) 1;
      }
      @keyframes bounce {
        0%   { transform: translateY(0) rotate(0); }
        30%  { transform: translateY(-12px) rotate(-8deg); }
        60%  { transform: translateY(2px) rotate(6deg); }
        100% { transform: translateY(0) rotate(0); }
      }

      .arrow {
        transition: transform 240ms ease;
      }
      .card:hover .arrow {
        transform: translateX(6px) rotate(-12deg);
      }

      /* ----- hero floaty bits ----- */
      .float-slow {
        animation: float 6s ease-in-out infinite;
      }
      .float-mid {
        animation: float 4.5s ease-in-out infinite;
        animation-delay: -1.2s;
      }
      .float-fast {
        animation: float 3.5s ease-in-out infinite;
        animation-delay: -2.4s;
      }
      @keyframes float {
        0%, 100% { transform: translateY(0) rotate(var(--r, 0deg)); }
        50%      { transform: translateY(-10px) rotate(calc(var(--r, 0deg) + 4deg)); }
      }

      /* ----- divider ----- */
      .divider-pill {
        background-image: linear-gradient(135deg, #0f172a, #1e293b);
      }

      /* ----- focus a11y ----- */
      a:focus-visible {
        outline: 3px solid #6366f1;
        outline-offset: 4px;
        border-radius: 14px;
      }

      /* preview wrapper "phones" for top/bottom sections */
      .preview {
        border-radius: 28px;
        overflow: hidden;
        position: relative;
      }
    </style>

    <script>
      // Inject the same landing fragment into three slots:
      // 1) light preview (no dark class)
      // 2) dark preview (forced .dark wrapper above)
      // 3) live toggle (controlled by #theme-toggle)
      (function () {
        const tpl = document.getElementById("landing-template");
        ["landing-light", "landing-dark", "landing-live"].forEach((id) => {
          const slot = document.getElementById(id);
          if (slot) slot.appendChild(tpl.content.cloneNode(true));
        });

        // ---- live toggle ----
        const root = document.documentElement;
        const toggle = document.getElementById("theme-toggle");
        const apply = (mode) => {
          if (mode === "dark") root.classList.add("dark");
          else root.classList.remove("dark");
        };
        // initial: respect prefers-color-scheme
        apply(
          window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light"
        );
        toggle?.addEventListener("click", () => {
          apply(root.classList.contains("dark") ? "light" : "dark");
        });

        // ---- local toggles inside each landing fragment ----
        // For previews 1 & 2 we don't want the local toggle to flip the whole page;
        // it should only flip the live-toggle section. So redirect them.
        document.querySelectorAll("[data-local-toggle]").forEach((btn) => {
          btn.addEventListener("click", () => {
            apply(root.classList.contains("dark") ? "light" : "dark");
            // also scroll to live section so user sees the change
            document
              .getElementById("live-toggle-section")
              ?.scrollIntoView({ behavior: "smooth", block: "start" });
          });
        });
      })();
    </script>
