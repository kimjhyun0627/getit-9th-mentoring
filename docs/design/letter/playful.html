<!doctype html>
<html lang="ko" class="">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GETIT 롤링페이퍼 · Playful</title>

    <!--
      ============================================================
      차별 포인트 (Playful):
      비비드 네온톤 포스트잇(hot pink/electric blue/lime/yellow/violet) +
      -8°~+8° 큰 회전 + 손그림 폰트(Quicksand) + 컬러 그림자 +
      스티커/이모지 도배 = "동아리 MT에서 한 명 한 명 붙인 메모판" 분위기.
      Warm은 차분한 파스텔, Playful은 형광 채도로 절대 수렴 안 함.
      본인 카드는 회전 0도 + 노란 dashed 테두리 + "내 카드" 뱃지로 한눈에.
      ============================================================
    -->

    <!-- Pretendard -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"
    />
    <!-- Display: Quicksand + Lexend (rounded, friendly) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Lexend:wght@500;700;800&family=Caveat:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ["Pretendard Variable", "Pretendard", "system-ui", "sans-serif"],
              display: ["Lexend", "Quicksand", "Pretendard Variable", "sans-serif"],
              round: ["Quicksand", "Lexend", "Pretendard Variable", "sans-serif"],
              hand: ["Caveat", "Quicksand", "Pretendard Variable", "cursive"],
            },
          },
        },
      };
    </script>

    <style>
      :root { color-scheme: light; }
      html.dark { color-scheme: dark; }

      /* ----- background: dotted + soft blobs ----- */
      .bg-dotted {
        background-image: radial-gradient(rgba(15, 23, 42, 0.08) 1.2px, transparent 1.2px);
        background-size: 22px 22px;
      }
      .dark .bg-dotted {
        background-image: radial-gradient(rgba(255, 255, 255, 0.08) 1.2px, transparent 1.2px);
      }
      .blob {
        position: absolute;
        border-radius: 9999px;
        filter: blur(60px);
        opacity: 0.55;
        pointer-events: none;
        z-index: 0;
      }
      .dark .blob { opacity: 0.35; filter: blur(70px); }

      /* ----- sticky notes: vivid neon palette ----- */
      .sticky {
        position: relative;
        border-radius: 18px;
        padding: 22px 20px 20px;
        box-shadow:
          0 14px 24px -10px rgba(0, 0, 0, 0.22),
          0 2px 4px rgba(0, 0, 0, 0.08),
          0 0 0 1px rgba(255, 255, 255, 0.35) inset;
        transition:
          transform 320ms cubic-bezier(0.34, 1.56, 0.64, 1),
          box-shadow 320ms ease;
        will-change: transform;
      }
      .sticky::after {
        /* tape strip on top */
        content: "";
        position: absolute;
        top: -10px;
        left: 50%;
        transform: translateX(-50%) rotate(-3deg);
        width: 56px;
        height: 18px;
        background: rgba(255, 255, 255, 0.55);
        border: 1px dashed rgba(0, 0, 0, 0.08);
        border-radius: 4px;
      }
      .sticky:hover {
        transform: rotate(0deg) translateY(-8px) scale(1.04) !important;
        box-shadow:
          0 26px 50px -16px rgba(0, 0, 0, 0.32),
          0 0 0 2px rgba(255, 255, 255, 0.55) inset;
        z-index: 5;
      }
      .dark .sticky {
        box-shadow:
          0 16px 30px -12px rgba(0, 0, 0, 0.6),
          0 0 28px -8px var(--glow, rgba(255, 255, 255, 0.18)),
          0 0 0 1px rgba(255, 255, 255, 0.08) inset;
      }
      .dark .sticky::after {
        background: rgba(255, 255, 255, 0.18);
        border-color: rgba(255, 255, 255, 0.12);
      }

      /* color variants — neon vivid */
      .sticky-pink   { background: #ff5fa8; color: #2a0419; --glow: rgba(255, 95, 168, 0.45); }
      .sticky-blue   { background: #4ec9ff; color: #00253d; --glow: rgba(78, 201, 255, 0.45); }
      .sticky-lime   { background: #c3ff4d; color: #1a2d00; --glow: rgba(195, 255, 77, 0.5); }
      .sticky-yellow { background: #ffe14d; color: #3a2a00; --glow: rgba(255, 225, 77, 0.5); }
      .sticky-violet { background: #b794ff; color: #1d0a45; --glow: rgba(183, 148, 255, 0.45); }
      .sticky-orange { background: #ff9a4d; color: #3a1700; --glow: rgba(255, 154, 77, 0.45); }
      .sticky-mint   { background: #5af0c2; color: #003a2a; --glow: rgba(90, 240, 194, 0.45); }
      .sticky-peach  { background: #ffb3c1; color: #44102a; --glow: rgba(255, 179, 193, 0.4); }

      /* dark: slightly desaturate + glow */
      .dark .sticky-pink   { background: #c14a82; color: #ffe2ee; }
      .dark .sticky-blue   { background: #2f9ac9; color: #e2f4ff; }
      .dark .sticky-lime   { background: #8fc534; color: #1a2d00; }
      .dark .sticky-yellow { background: #d3b733; color: #3a2a00; }
      .dark .sticky-violet { background: #8a6dd0; color: #ece2ff; }
      .dark .sticky-orange { background: #cc7434; color: #fff0e2; }
      .dark .sticky-mint   { background: #46c89c; color: #003a2a; }
      .dark .sticky-peach  { background: #c98ba0; color: #3a0d1f; }

      /* tilts */
      .tilt-1  { transform: rotate(-6deg); }
      .tilt-2  { transform: rotate(4deg); }
      .tilt-3  { transform: rotate(-3deg); }
      .tilt-4  { transform: rotate(7deg); }
      .tilt-5  { transform: rotate(-8deg); }
      .tilt-6  { transform: rotate(2deg); }
      .tilt-7  { transform: rotate(5deg); }
      .tilt-8  { transform: rotate(-4deg); }
      .tilt-9  { transform: rotate(6deg); }
      .tilt-10 { transform: rotate(-2deg); }
      .tilt-11 { transform: rotate(3deg); }
      .tilt-12 { transform: rotate(-5deg); }

      /* MINE — straight + dashed ring + glow */
      .sticky-mine {
        transform: rotate(0deg) scale(1.03);
        outline: 3px dashed #facc15;
        outline-offset: 4px;
        z-index: 2;
      }
      .dark .sticky-mine { outline-color: #fde047; }

      /* float anim for FAB / hero stickers */
      @keyframes float {
        0%, 100% { transform: translateY(0) rotate(var(--r, 0deg)); }
        50%      { transform: translateY(-8px) rotate(calc(var(--r, 0deg) + 4deg)); }
      }
      .float-slow { animation: float 6s ease-in-out infinite; }
      .float-mid  { animation: float 4.5s ease-in-out infinite; animation-delay: -1.2s; }
      .float-fast { animation: float 3.5s ease-in-out infinite; animation-delay: -2.4s; }

      /* FAB bounce */
      @keyframes bounce-in {
        0%   { transform: translateY(0); }
        30%  { transform: translateY(-6px) rotate(-4deg); }
        60%  { transform: translateY(2px) rotate(3deg); }
        100% { transform: translateY(0); }
      }
      .fab:hover { animation: bounce-in 700ms cubic-bezier(0.34, 1.56, 0.64, 1) 1; }

      .divider-pill {
        background-image: linear-gradient(135deg, #0f172a, #1e293b);
      }

      /* focus a11y */
      a:focus-visible,
      button:focus-visible {
        outline: 3px solid #6366f1;
        outline-offset: 3px;
        border-radius: 14px;
      }

      /* handwritten signature on stickies */
      .hand { font-family: "Caveat", cursive; }
    </style>
  </head>
  <body class="font-sans antialiased bg-slate-50 text-slate-900">
    <!-- =================== LIGHT PREVIEW =================== -->

        </button>

    </section>

    <script>
      (function () {
        const tpl = document.getElementById("board-template");
        ["board-light", "board-dark", "board-live"].forEach((id) => {
          const slot = document.getElementById(id);
          if (slot) slot.appendChild(tpl.content.cloneNode(true));
        });
        // dedupe fixed FABs: only the live section's FAB should be "fixed"
        // (since multiple cloned templates would stack). Convert previews' FABs to absolute-positioned within their section.
        document.querySelectorAll("#board-light .fab, #board-dark .fab").forEach((b) => {
          b.classList.remove("fixed");
          b.classList.add("absolute");
        });

        // live toggle
        const root = document.documentElement;
        const toggle = document.getElementById("theme-toggle");
        const apply = (mode) => {
          if (mode === "dark") root.classList.add("dark");
          else root.classList.remove("dark");
        };
        apply(
          window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light"
        );
        toggle?.addEventListener("click", () => {
          apply(root.classList.contains("dark") ? "light" : "dark");
        });
        document.querySelectorAll("[data-local-toggle]").forEach((btn) => {
          btn.addEventListener("click", () => {
            apply(root.classList.contains("dark") ? "light" : "dark");
          });
        });
      })();
    </script>
