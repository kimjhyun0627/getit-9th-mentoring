# CodeRabbit configuration
# 자세히: https://docs.coderabbit.ai/guides/configure-coderabbit

language: ko-KR
early_access: false
tone_instructions: >
  무조건 한국어 반말로 답변. 영어 출력 절대 금지(코드 식별자 외).
  간결하고 직설적으로 — 친절·격식·근거 없는 칭찬 금지.
  코드 인용 블록(blockquote `>` 또는 ``` 인용)은 최소화. 라인 번호와 짧은 설명으로 충분하면 인용 생략.
  Summary 섹션은 짧게 요약만, 변경 walkthrough 표 형식 피하기.

reviews:
  profile: chill
  # 머지 게이트: CodeRabbit이 깨끗하다고 판단하면 APPROVED, 이슈 있으면 REQUEST_CHANGES.
  # request_changes_workflow: true 가 핵심 — COMMENTED 대신 APPROVE/REQUEST_CHANGES 상태 강제.
  # .github/workflows/coderabbit-approval-gate.yml 가 마지막 리뷰 state == APPROVED 검증.
  request_changes_workflow: true
  # Summary / walkthrough 노이즈 최소화 — 라인 코멘트가 메인.
  high_level_summary: false
  high_level_summary_in_walkthrough: false
  poem: false
  review_status: false
  collapse_walkthrough: true
  # 라인 코멘트가 충분하므로 sequence-diagram / 변경 표 생략
  sequence_diagrams: false
  changed_files_summary: false
  assess_linked_issues: true
  related_issues: false
  related_prs: false
  suggested_labels: false
  suggested_reviewers: false
  auto_review:
    enabled: true
    drafts: false
    ignore_title_keywords:
      - WIP
      - DRAFT
  path_filters:
    - "!**/pnpm-lock.yaml"
    - "!**/package-lock.json"
    - "!**/yarn.lock"
    - "!**/node_modules/**"
    - "!**/dist/**"
    - "!**/.turbo/**"
    - "!**/coverage/**"
    - "!**/.next/**"
  path_instructions:
    - path: "**/*.{js,jsx}"
      instructions: "JS only 모노레포. JSDoc + Zod 사용. 한 파일 300줄 max, 150줄 권장."
    - path: "apps/*-api/**"
      instructions: "Express + Prisma + Zod. TDD 필수 (Vitest + supertest)."
    - path: "apps/*-web/**"
      instructions: "Vite + React + Tailwind + Zustand + TanStack Query. Tailwind darkMode: 'class'."

chat:
  auto_reply: true

knowledge_base:
  opt_out: false
  learnings:
    scope: auto
  issues:
    scope: auto
  pull_requests:
    scope: auto
