name: coderabbit approval gate

# CodeRabbit은 APPROVE/REQUEST_CHANGES 둘 다 줄 수 있음 (.coderabbit.yaml의
# request_changes_workflow: true 설정으로 강제).
# 게이트 정책: 마지막 CR 리뷰 state가 APPROVED 일 때만 통과.
#
# 흐름: PR opened → CR 자동 리뷰 → REQUEST_CHANGES(라인 코멘트) 또는 APPROVED
#       → 라인 코멘트 적용/보류 답글 + resolve → `@coderabbitai full review` 로 재리뷰
#       → CR이 clean하다고 판단하면 APPROVED → 게이트 통과
#
# Gemini는 별도 engagement gate (APPROVE 미지원이라 다른 모델).

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted, edited, dismissed]
  pull_request_review_comment:
    types: [created, edited, deleted]

permissions:
  contents: read
  pull-requests: read

jobs:
  coderabbit-approved:
    name: coderabbitai approved
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: PR에 coderabbitai[bot] 의 가장 최신 리뷰가 APPROVED 인지 확인
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.setFailed('pull_request 컨텍스트가 없음');
              return;
            }

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const cr = reviews.filter(
              (r) => r.user && /^coderabbitai(-staging)?\[bot\]$/.test(r.user.login),
            );
            cr.sort((a, b) => new Date(b.submitted_at) - new Date(a.submitted_at));

            if (cr.length === 0) {
              core.setFailed(
                'CodeRabbit 리뷰가 아직 없음. PR opened 후 ~1-3분 대기. 강제 머지 금지.',
              );
              return;
            }

            const latest = cr[0];
            core.info(
              `CodeRabbit 마지막 리뷰: state=${latest.state}, submitted_at=${latest.submitted_at}`,
            );

            if (latest.state === 'APPROVED') {
              core.info('✅ CodeRabbit APPROVED — 게이트 통과');
              return;
            }

            core.setFailed(
              `CodeRabbit 리뷰 state=${latest.state}. APPROVED 필요. ` +
                `라인 코멘트 적용/보류 답글 + resolve 후 \`@coderabbitai full review\` 로 재리뷰 요청.`,
            );
