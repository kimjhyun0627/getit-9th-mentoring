name: coderabbit engagement gate

# CodeRabbit이 APPROVED를 잘 안 줘서 (보통 COMMENTED + 라인 코멘트) 게이트가 영구 FAIL.
# 정책 변경: "CodeRabbit이 남긴 모든 thread가 resolved + 답글 1개 이상" 면 통과.
# 즉 라인 코멘트를 적용하거나 보류 사유 답글로 닫으면 자동 통과 — Gemini engagement gate와 동일 모델.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted, edited, dismissed]
  pull_request_review_comment:
    types: [created, edited, deleted]

permissions:
  contents: read
  pull-requests: read

jobs:
  coderabbit-threads-handled:
    name: coderabbitai threads handled
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: CodeRabbit thread가 다 resolved + 답글 있는지 확인
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.setFailed('pull_request 컨텍스트가 없음');
              return;
            }

            const query = `
              query($owner:String!, $repo:String!, $pr:Int!) {
                repository(owner:$owner, name:$repo) {
                  pullRequest(number:$pr) {
                    reviewThreads(first:100) {
                      nodes {
                        isResolved
                        comments(first:20) {
                          totalCount
                          nodes { author { login } }
                        }
                      }
                    }
                  }
                }
              }
            `;
            const data = await github.graphql(query, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pr: pr.number,
            });

            const threads = data.repository.pullRequest.reviewThreads.nodes;

            // CodeRabbit(또는 coderabbitai-staging)이 시작한 thread만 필터
            const crThreads = threads.filter((t) => {
              const first = t.comments.nodes[0];
              return first && first.author && /^coderabbitai(-staging)?$/.test(first.author.login);
            });

            if (crThreads.length === 0) {
              core.info('CodeRabbit이 남긴 라인 thread 없음 → 게이트 통과 (vacuously true).');
              return;
            }

            const offenders = crThreads.filter(
              (t) => !t.isResolved || t.comments.totalCount < 2,
            );

            if (offenders.length === 0) {
              core.info(
                `✅ CodeRabbit thread ${crThreads.length}개 전부 처리됨 (resolved + 답글).`,
              );
              return;
            }

            const unresolved = offenders.filter((t) => !t.isResolved).length;
            const silent = offenders.filter((t) => t.isResolved && t.comments.totalCount < 2).length;
            core.setFailed(
              `CodeRabbit thread 미처리: unresolved=${unresolved}, 답글없음=${silent}. ` +
                `각 thread에 적용/보류 답글 + resolve 필요 (또는 @coderabbitai resolve).`,
            );
