name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    name: format / lint / test / build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dockerfile workspace COPY drift
        # 2026-05-26 라이브 다운 (45min) 재발 방지: 신규 workspace 패키지가 추가됐는데
        # 의존 앱 Dockerfile 에 COPY 라인이 동기화 안 되면 production 부팅 실패.
        # 가드 스크립트는 표준 Node API 만 사용 — pnpm 설치 의존 없음 (어디서 돌려도 OK).
        run: node tools/ci/check-dockerfile-workspace-sync.mjs

      - name: Dockerfile workspace COPY drift — guard self-tests
        run: node --test tools/ci/check-dockerfile-workspace-sync.test.mjs

      - name: Format check
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build
