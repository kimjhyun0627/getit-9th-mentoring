name: Deploy

# Phase 4 — build 11 images, push to GHCR, SSH-trigger `compose pull && up -d`
# on the GCP VM. Trigger is manual until the VM + DNS + secrets are in place
# (sub-issue #102). Once stable, uncomment the `push` block below to enable
# auto-deploy on every merge to main.
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to build & deploy"
        required: false
        default: "latest"
  # push:
  #   branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

# Only main may deploy. Run from any branch is blocked at job level.
permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}
  # Default to the commit SHA so feature-branch runs can never overwrite `latest`.
  IMAGE_TAG: ${{ github.event.inputs.image_tag || github.sha }}

jobs:
  # ───────────────────── 1. Build & push 11 images ─────────────────────
  build:
    name: build-and-push (${{ matrix.app }})
    # Gate on main — feature-branch manual runs are not allowed to publish.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        app:
          - landing
          - auth-web
          - auth-api
          - hobby-web
          - hobby-api
          - shelf-web
          - shelf-api
          - board-web
          - board-api
          - letter-web
          - letter-api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.app }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.app }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.app }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,scope=${{ matrix.app }},mode=max
          provenance: false
          # 6 web 의 Vite 빌드 타임 env (#585). 누락 시 `/api` fallback 으로
          # 현재 origin 을 친다 → 학번 모달 PATCH 404. API 이미지는 ARG 미정의
          # → docker 가 무시. URL 은 시크릿 X — vars 또는 인라인 디폴트 OK.
          build-args: |
            VITE_AUTH_API_URL=${{ vars.VITE_AUTH_API_URL || 'https://auth.get-it.cloud/api' }}
            VITE_AUTH_URL=${{ vars.VITE_AUTH_URL || 'https://auth.get-it.cloud' }}
            VITE_AUTH_ORIGIN=${{ vars.VITE_AUTH_ORIGIN || 'https://auth.get-it.cloud' }}
            VITE_API_URL=${{ vars.VITE_API_URL || '/api' }}
            VITE_NICKNAME_ONBOARDING_ENFORCED=${{ vars.VITE_NICKNAME_ONBOARDING_ENFORCED }}

  # ────────────────── 2. SSH to VM and roll the stack ──────────────────
  deploy:
    name: ssh-deploy
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
    steps:
      # Probe script (tools/ci/post-deploy-health.sh) 가 워크스페이스에 있어야 하므로
      # ssh-deploy 직전에 repo 를 checkout. ssh step 은 어차피 VM 에서 git pull 하므로
      # runner-side 작업 디렉토리에 영향 없음.
      - name: Checkout (for health probe script)
        uses: actions/checkout@v4

      - name: Deploy on VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          port: 22
          envs: IMAGE_TAG
          script: |
            set -euo pipefail
            cd /opt/getit
            git fetch --depth=1 origin main
            git reset --hard origin/main
            cd infra
            export IMAGE_TAG="${IMAGE_TAG:-latest}"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker compose --env-file .env.prod -f docker-compose.prod.yml pull

            # ─── Prisma migrate (Issue #587) ────────────────────────────────
            # 5 BE 모두 분리된 DB schema. 새 컨테이너 up 전에 schema 갱신해야
            # 옛 schema 위에서 boot 하다 죽는 사고 방지. mysql 을 먼저 띄워서
            # migrate 컨테이너가 DB 에 connect 가능하게.
            # `run --rm` = 1회 실행 후 자동 정리. pending migration 없으면
            # `prisma migrate deploy` 는 silent OK (no-op).
            # migrate 실패 시 `set -e` 로 abort → 이전 컨테이너 그대로 (rollback).
            docker compose --env-file .env.prod -f docker-compose.prod.yml up -d mysql
            for svc in auth-api hobby-api shelf-api board-api letter-api; do
              echo "── prisma migrate deploy: $svc ──"
              docker compose --env-file .env.prod -f docker-compose.prod.yml \
                run --rm --entrypoint /app/node_modules/.bin/prisma "$svc" \
                migrate deploy --schema=prisma/schema.prisma
            done

            docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f

      # Post-deploy health probe — 5 BE API + 6 web (#587).
      # 배경: 2026-05-26 run 26473512779 은 ssh-deploy success 였지만 5 BE 컨테이너가
      # dotenv ERR_MODULE_NOT_FOUND 로 boot 실패. `docker compose up -d` 만으로는
      # 컨테이너 crash 를 감지 못 함 → silent 45분 다운. 11/11 endpoint 통과 강제로
      # 차단. 컨테이너 ready 까지 시차 허용: 5s × 12 retry = 60s. 실패 시 stderr 에
      # 어느 endpoint / HTTP code / retry 횟수 명시 후 exit 1 → workflow 실패 알림.
      - name: Post-deploy health probe (5 API + 6 web)
        if: success()
        run: |
          chmod +x tools/ci/post-deploy-health.sh
          tools/ci/post-deploy-health.sh
