name: Deploy

# Phase 4 — build 11 images, push to GHCR, SSH-trigger `compose pull && up -d`
# on the GCP VM. Trigger is manual until the VM + DNS + secrets are in place
# (sub-issue #102). Once stable, uncomment the `push` block below to enable
# auto-deploy on every merge to main.
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to build & deploy"
        required: false
        default: "latest"
  # push:
  #   branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

# Only main may deploy. Run from any branch is blocked at job level.
permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}
  # Default to the commit SHA so feature-branch runs can never overwrite `latest`.
  IMAGE_TAG: ${{ github.event.inputs.image_tag || github.sha }}

jobs:
  # ───────────────────── 1. Build & push 11 images ─────────────────────
  build:
    name: build-and-push (${{ matrix.app }})
    # Gate on main — feature-branch manual runs are not allowed to publish.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        app:
          - landing
          - auth-web
          - auth-api
          - hobby-web
          - hobby-api
          - shelf-web
          - shelf-api
          - board-web
          - board-api
          - letter-web
          - letter-api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.app }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.app }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.app }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,scope=${{ matrix.app }},mode=max
          provenance: false
          # 6 web 의 Vite 빌드 타임 env (#585). 누락 시 `/api` fallback 으로
          # 현재 origin 을 친다 → 학번 모달 PATCH 404. API 이미지는 ARG 미정의
          # → docker 가 무시. URL 은 시크릿 X — vars 또는 인라인 디폴트 OK.
          build-args: |
            VITE_AUTH_API_URL=${{ vars.VITE_AUTH_API_URL || 'https://auth.get-it.cloud/api' }}
            VITE_AUTH_URL=${{ vars.VITE_AUTH_URL || 'https://auth.get-it.cloud' }}
            VITE_AUTH_ORIGIN=${{ vars.VITE_AUTH_ORIGIN || 'https://auth.get-it.cloud' }}
            VITE_API_URL=${{ vars.VITE_API_URL || '/api' }}
            VITE_NICKNAME_ONBOARDING_ENFORCED=${{ vars.VITE_NICKNAME_ONBOARDING_ENFORCED }}

  # ────────────────── 2. SSH to VM and roll the stack ──────────────────
  deploy:
    name: ssh-deploy
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
    steps:
      - name: Deploy on VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          port: 22
          envs: IMAGE_TAG
          script: |
            set -euo pipefail
            cd /opt/getit
            git fetch --depth=1 origin main
            git reset --hard origin/main
            cd infra
            export IMAGE_TAG="${IMAGE_TAG:-latest}"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker compose --env-file .env.prod -f docker-compose.prod.yml pull
            docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f

      - name: Health check (landing)
        if: success()
        run: |
          set -euo pipefail
          for i in {1..10}; do
            if curl -fsS --max-time 5 "https://get-it.cloud/healthz" >/dev/null; then
              echo "landing healthy"; exit 0
            fi
            echo "attempt $i: waiting for landing…"; sleep 10
          done
          echo "landing did not become healthy" >&2
          exit 1
