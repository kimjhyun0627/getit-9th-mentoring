name: gemini engagement gate

# Gemini Code Assist는 베타라 APPROVED 못 줌. 대신:
# "Gemini가 남긴 모든 thread가 resolved + 답글 1개 이상" 인지 검증.
# 즉 코멘트를 적용하거나 보류 사유 답글로 닫으면 통과.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted, edited, dismissed]
  pull_request_review_comment:
    types: [created, edited, deleted]

permissions:
  contents: read
  pull-requests: read

jobs:
  gemini-threads-handled:
    name: gemini-code-assist threads handled
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Gemini thread가 다 resolved + 답글 있는지 확인
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.setFailed('pull_request 컨텍스트가 없음');
              return;
            }

            // GraphQL — reviewThreads + 작성자 정보
            const query = `
              query($owner:String!, $repo:String!, $pr:Int!) {
                repository(owner:$owner, name:$repo) {
                  pullRequest(number:$pr) {
                    reviewThreads(first:100) {
                      nodes {
                        isResolved
                        comments(first:20) {
                          totalCount
                          nodes { author { login } }
                        }
                      }
                    }
                  }
                }
              }
            `;
            const data = await github.graphql(query, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pr: pr.number,
            });

            // Gemini가 review를 최소 1번은 submit 했는지 확인 (리뷰 전 머지 방지).
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });
            const geminiReviewed = reviews.some(
              (r) => r.user && r.user.login === 'gemini-code-assist[bot]',
            );

            if (!geminiReviewed) {
              core.setFailed(
                'Gemini Code Assist 리뷰가 아직 없음. 리뷰 완료까지 대기 (~1-3분).',
              );
              return;
            }

            const threads = data.repository.pullRequest.reviewThreads.nodes;

            // Gemini가 *시작한* thread만 (첫 comment author == gemini-code-assist)
            const geminiThreads = threads.filter((t) => {
              const first = t.comments.nodes[0];
              return first && first.author && first.author.login === 'gemini-code-assist';
            });

            if (geminiThreads.length === 0) {
              core.info(
                'Gemini 리뷰 완료 + 라인 thread 없음 → 게이트 통과 (clean review).',
              );
              return;
            }

            // 모든 thread가 (resolved) AND (commentCount >= 2 = 답글 있음)
            const offenders = geminiThreads.filter(
              (t) => !t.isResolved || t.comments.totalCount < 2,
            );

            if (offenders.length === 0) {
              core.info(
                `✅ Gemini thread ${geminiThreads.length}개 전부 처리됨 (resolved + 답글).`,
              );
              return;
            }

            const unresolved = offenders.filter((t) => !t.isResolved).length;
            const silent = offenders.filter((t) => t.isResolved && t.comments.totalCount < 2).length;
            core.setFailed(
              `Gemini thread 미처리: unresolved=${unresolved}, 답글없음=${silent}. ` +
                `각 thread에 적용/보류 답글 + resolve 필요.`,
            );
