# actions/labeler@v5 config
# 변경된 파일 경로 기반으로 PR 라벨 자동 부착.
# 라벨 자체는 .github/labels.json 으로 사전 생성되어 있어야 함.

"project/landing":
  - changed-files:
      - any-glob-to-any-file:
          - "apps/landing/**"

"project/auth":
  - changed-files:
      - any-glob-to-any-file:
          - "apps/auth-*/**"

"project/hobby":
  - changed-files:
      - any-glob-to-any-file:
          - "apps/hobby-*/**"

"project/shelf":
  - changed-files:
      - any-glob-to-any-file:
          - "apps/shelf-*/**"

"project/board":
  - changed-files:
      - any-glob-to-any-file:
          - "apps/board-*/**"

"project/letter":
  - changed-files:
      - any-glob-to-any-file:
          - "apps/letter-*/**"

"project/infra":
  - changed-files:
      - any-glob-to-any-file:
          - "infra/**"
          - ".github/**"
          - "docker-compose*.yml"
          - "turbo.json"
          - "pnpm-workspace.yaml"

"role/fe":
  - changed-files:
      - any-glob-to-any-file:
          - "apps/*-web/**"
          - "packages/theme/**"
          - "packages/config-tailwind/**"

"role/be":
  - changed-files:
      - any-glob-to-any-file:
          - "apps/*-api/**"

"role/dba":
  - changed-files:
      - any-glob-to-any-file:
          - "apps/*-api/prisma/**"

"role/devops":
  - changed-files:
      - any-glob-to-any-file:
          - "infra/**"
          - ".github/workflows/**"

"type/docs":
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.md"
          - "docs/**"
