<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 28 28"
  role="img"
  aria-label="팀 칸반"
>
  <!--
    board-web favicon — Minimalist 페르소나 (#533).
    `apps/board-web/src/components/BrandMark.jsx` 의 칸반 3-컬럼 카드 모티프를
    standalone SVG 로 추출.

    Tailwind `fill-foreground` (라이트 #09090b, 다크 #fafafa) 토큰을
    favicon 은 단일 SVG 이므로 라이트 기준 (#09090b) 으로 인쇄.
    브라우저 탭은 다크 배경에서도 외곽 라운드 박스가 충분히 식별됨.

    팔레트:
    - #09090b  foreground (외곽 박스)
    - #fafafa  background (안쪽 카드)
  -->
  <rect x="2" y="2" width="24" height="24" rx="6" fill="#09090b" />
  <rect x="6" y="7" width="4.5" height="3" rx="0.6" fill="#fafafa" />
  <rect x="11.75" y="7" width="4.5" height="3" rx="0.6" fill="#fafafa" fill-opacity="0.7" />
  <rect x="11.75" y="11.5" width="4.5" height="3" rx="0.6" fill="#fafafa" fill-opacity="0.5" />
  <rect x="17.5" y="7" width="4.5" height="3" rx="0.6" fill="#fafafa" fill-opacity="0.3" />
</svg>
