    />
    <!-- Inter (LATIN body) + JetBrains Mono (heading/meta) — Tech-Dark 시안 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <title>GETIT 9기 멘토링</title>

    <!--
      No-flash 다크 부트스트랩.
      Tech-Dark는 다크가 기본. localStorage 저장값이 'light'가 아니면 다크 클래스 미리 적용
      → React/ThemeProvider hydration 전에 .dark가 박혀 색 깜빡임 없음.
      packages/theme의 STORAGE_KEY('getit:theme')와 동일 키 사용.
    -->
    <script>
      (function () {
        try {
          var saved = window.localStorage.getItem('getit:theme');
          var isLight = saved === 'light';
          if (!isLight) {
            document.documentElement.classList.add('dark');
          }
        } catch (_) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
