<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 24 24"
  role="img"
  aria-label="스마트 서재"
>
  <!--
    shelf-web favicon — Editorial 페르소나 (#533).
    `apps/shelf-web/src/components/BrandMark.jsx` 의 책 더미 + 책갈피 모티프를
    standalone SVG 로 추출. Tailwind `stroke-current` → 명시 hex (#0a0a0a) 로 치환.

    팔레트:
    - #0a0a0a  ink (charcoal stroke)
    - #7c1d1d  wine (책갈피)
  -->
  <rect
    x="3.5"
    y="5"
    width="3.5"
    height="14"
    rx="0.6"
    fill="none"
    stroke="#0a0a0a"
    stroke-width="1.4"
  />
  <path
    d="M8.4 5.5 11.6 5 13 18.6l-3.2.5z"
    fill="none"
    stroke="#0a0a0a"
    stroke-width="1.4"
    stroke-linejoin="round"
  />
  <rect
    x="14.5"
    y="5"
    width="6"
    height="14"
    rx="0.6"
    fill="none"
    stroke="#0a0a0a"
    stroke-width="1.4"
  />
  <path
    d="M16.4 5v6l1.1-1 1.1 1V5"
    fill="#7c1d1d"
    stroke="#7c1d1d"
    stroke-width="0.8"
    stroke-linejoin="round"
  />
</svg>
