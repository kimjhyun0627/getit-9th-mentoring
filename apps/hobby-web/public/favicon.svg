<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 40 40"
  role="img"
  aria-label="취미메이트"
>
  <!--
    hobby-web favicon — Playful 페르소나 (#533).
    `apps/hobby-web/src/components/BrandMark.jsx` 의 두 사람 + 그라데이션 모티프를
    standalone SVG 로 추출. rose → fuchsia → violet linearGradient 그대로 사용.

    팔레트:
    - #fb7185  rose
    - #d946ef  fuchsia
    - #8b5cf6  violet
  -->
  <defs>
    <linearGradient id="hobby-grad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fb7185" />
      <stop offset="55%" stop-color="#d946ef" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="38" height="38" rx="12" fill="url(#hobby-grad)" />
  <circle cx="15.5" cy="17" r="4.5" fill="#fff" />
  <circle cx="24.5" cy="17" r="4.5" fill="#fff" />
  <path
    d="M8 30c1.5-4.5 5.5-7 9-7 1.6 0 2.7.4 3 1 .3-.6 1.4-1 3-1 3.5 0 7.5 2.5 9 7"
    fill="none"
    stroke="#fff"
    stroke-width="2.4"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
